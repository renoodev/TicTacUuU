<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Magic Editor - GitHub Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #0f172a;
            color: #f1f5f9;
        }

        .glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .canvas-container {
            cursor: crosshair;
            touch-action: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 18px;
            width: 18px;
            border-radius: 50%;
            background: #6366f1;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(99, 102, 241, 0.5);
        }

        .loader {
            border-top-color: #6366f1;
            animation: spinner 0.6s linear infinite;
        }

        @keyframes spinner {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .gradient-text {
            background: linear-gradient(90deg, #818cf8, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <!-- Header -->
        <header class="flex flex-col md:flex-row justify-between items-center mb-10 gap-4">
            <div>
                <h1 class="text-3xl font-extrabold tracking-tight gradient-text">GEN-AI MAGIC EDITOR</h1>
                <p class="text-slate-400 text-sm">Versi Produksi GitHub - Didukung oleh Gemini 2.5</p>
            </div>
            
            <!-- API Key Status/Input -->
            <div id="apiStatusBox" class="flex items-center gap-3 bg-slate-800 p-2 rounded-2xl border border-slate-700">
                <input type="password" id="manualApiKey" placeholder="Masukkan API Key Anda..." 
                       class="bg-transparent px-3 py-1 text-xs outline-none w-40 border-r border-slate-700" />
                <button onclick="saveManualKey()" class="text-[10px] font-bold text-indigo-400 hover:text-indigo-300 uppercase tracking-widest px-2">
                    Simpan Key
                </button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <!-- Sidebar Controls -->
            <aside class="lg:col-span-4 space-y-6">
                <div class="glass p-6 rounded-3xl shadow-2xl">
                    <h2 class="text-lg font-semibold mb-4 flex items-center gap-2">
                        <i class="fas fa-magic text-indigo-400"></i> Kontrol Editor
                    </h2>

                    <!-- Mode Selector -->
                    <div class="flex bg-slate-900/50 p-1 rounded-2xl mb-6 border border-slate-700">
                        <button id="addModeBtn" onclick="setMode('add')" 
                                class="flex-1 py-3 rounded-xl text-xs font-bold flex items-center justify-center gap-2 transition-all bg-indigo-600 text-white shadow-lg">
                            <i class="fas fa-plus"></i> TAMBAH
                        </button>
                        <button id="removeModeBtn" onclick="setMode('remove')" 
                                class="flex-1 py-3 rounded-xl text-xs font-bold flex items-center justify-center gap-2 transition-all text-slate-400 hover:text-white">
                            <i class="fas fa-eraser"></i> HAPUS
                        </button>
                    </div>

                    <!-- Prompt Input -->
                    <div id="promptSection" class="mb-6">
                        <label class="block text-[10px] font-bold text-slate-500 uppercase mb-2 tracking-widest">Deskripsi Penambahan</label>
                        <textarea id="promptInput" placeholder="Contoh: Seekor burung elang emas terbang di atas awan..." 
                                  class="w-full bg-slate-900 border border-slate-700 rounded-xl p-4 text-sm focus:ring-2 focus:ring-indigo-500 outline-none min-h-[100px] resize-none text-slate-200"></textarea>
                    </div>

                    <!-- Brush Size -->
                    <div class="mb-8">
                        <div class="flex justify-between items-center mb-3">
                            <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Ukuran Kuas</label>
                            <span id="brushSizeVal" class="text-xs font-mono text-indigo-400 bg-indigo-400/10 px-2 py-0.5 rounded">40px</span>
                        </div>
                        <input type="range" id="brushSizeInput" min="5" max="150" value="40" 
                               class="w-full h-1.5 bg-slate-700 rounded-lg appearance-none cursor-pointer"
                               oninput="updateBrushSize(this.value)">
                    </div>

                    <!-- Action Buttons -->
                    <div id="uploadSection">
                        <label class="block w-full bg-indigo-600 hover:bg-indigo-500 text-white py-4 rounded-2xl text-center font-bold cursor-pointer shadow-lg shadow-indigo-900/20 transition-all active:scale-95">
                            <i class="fas fa-cloud-upload-alt mr-2"></i> UNGGAH FOTO
                            <input type="file" id="fileInput" class="hidden" accept="image/*" onchange="handleFileUpload(event)">
                        </label>
                    </div>

                    <div id="editorActions" class="hidden space-y-3">
                        <button onclick="processAI()" id="processBtn"
                                class="w-full bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 text-white py-4 rounded-2xl font-bold shadow-xl shadow-indigo-900/40 transition-all flex items-center justify-center gap-2">
                            <span id="btnText">TERAPKAN SIHIR AI</span>
                            <div id="btnLoader" class="hidden loader w-5 h-5 border-2 border-white/20 rounded-full"></div>
                        </button>
                        <button onclick="resetMask()" class="w-full bg-slate-700/50 hover:bg-slate-700 text-slate-300 py-3 rounded-2xl text-xs font-bold transition-all">
                            <i class="fas fa-undo mr-2"></i> Hapus Goresan
                        </button>
                    </div>
                </div>

                <div id="statusMsg" class="hidden p-4 rounded-2xl text-xs font-medium border animate-in slide-in-from-left-4"></div>
            </aside>

            <!-- Main Canvas Area -->
            <main class="lg:col-span-8 flex flex-col gap-6">
                <div id="canvasBox" class="glass rounded-[2.5rem] border-4 border-slate-800 shadow-2xl overflow-hidden min-h-[550px] flex items-center justify-center relative bg-[#020617]">
                    <div id="placeholder" class="text-center p-12">
                        <div class="w-24 h-24 bg-slate-800/50 rounded-3xl flex items-center justify-center mx-auto mb-6 border border-slate-700">
                            <i class="fas fa-plus-square text-4xl text-slate-600"></i>
                        </div>
                        <h3 class="text-xl font-bold text-slate-300">Mulai Proyek Baru</h3>
                        <p class="text-slate-500 text-sm mt-2 max-w-xs mx-auto">Unggah foto untuk mulai mengedit area secara ajaib.</p>
                    </div>

                    <canvas id="mainCanvas" class="hidden canvas-container max-w-full rounded-xl shadow-2xl"></canvas>

                    <div id="processingOverlay" class="hidden absolute inset-0 bg-slate-900/90 backdrop-blur-md z-50 flex flex-col items-center justify-center text-center p-8">
                        <div class="loader w-16 h-16 border-4 border-white/10 rounded-full mb-6"></div>
                        <h4 class="text-xl font-black text-white mb-2">AI SEDANG BEKERJA</h4>
                        <p class="text-slate-400 text-sm">Menghubungkan ke server Gemini 2.5...</p>
                    </div>

                    <div id="resultView" class="hidden absolute inset-0 bg-slate-950 z-[60] p-6 flex flex-col animate-in fade-in zoom-in-95 duration-500">
                        <div class="flex flex-col sm:flex-row justify-between items-center mb-6 gap-4">
                            <div class="flex items-center gap-3">
                                <div class="w-10 h-10 bg-emerald-500/20 rounded-full flex items-center justify-center">
                                    <i class="fas fa-check text-emerald-500"></i>
                                </div>
                                <h4 class="text-sm font-bold text-white">Render Selesai</h4>
                            </div>
                            <div class="flex gap-2 w-full sm:w-auto">
                                <button onclick="downloadImage()" class="flex-1 sm:flex-none bg-emerald-600 hover:bg-emerald-500 text-white px-6 py-2.5 rounded-xl text-xs font-bold shadow-lg shadow-emerald-900/20">
                                    SIMPAN HASIL
                                </button>
                                <button onclick="closeResult()" class="flex-1 sm:flex-none bg-slate-800 hover:bg-slate-700 text-white px-6 py-2.5 rounded-xl text-xs font-bold">
                                    EDIT LAGI
                                </button>
                            </div>
                        </div>
                        <div class="flex-1 bg-[#020617] rounded-3xl overflow-hidden flex items-center justify-center border border-slate-800">
                            <img id="resultImg" src="" alt="AI Output" class="max-w-full max-h-full object-contain">
                        </div>
                    </div>
                </div>
            </aside>
        </div>
    </div>

    <script>
        // SISTEM API KEY: Prioritas 1 (Sistem Otomatis), Prioritas 2 (Manual Input)
        let systemApiKey = "AIzaSyCukpxVqnzXkWutvUPvoxIYMG2pZIjJw9w"; 
        let manualApiKey = localStorage.getItem('magic_editor_api_key') || "";
        
        if (manualApiKey) document.getElementById('manualApiKey').value = manualApiKey;

        function saveManualKey() {
            const val = document.getElementById('manualApiKey').value.trim();
            if (val) {
                manualApiKey = val;
                localStorage.setItem('magic_editor_api_key', val);
                showStatus("API Key berhasil disimpan!", "success");
            }
        }

        let canvas = document.getElementById('mainCanvas');
        let ctx = canvas.getContext('2d');
        let isDrawing = false;
        let editMode = 'add';
        let brushSize = 40;
        let originalImage = null;
        let base64Image = null;

        function setMode(mode) {
            editMode = mode;
            const addBtn = document.getElementById('addModeBtn');
            const removeBtn = document.getElementById('removeModeBtn');
            const promptSection = document.getElementById('promptSection');
            if (mode === 'add') {
                addBtn.className = "flex-1 py-3 rounded-xl text-xs font-bold flex items-center justify-center gap-2 transition-all bg-indigo-600 text-white shadow-lg";
                removeBtn.className = "flex-1 py-3 rounded-xl text-xs font-bold flex items-center justify-center gap-2 transition-all text-slate-400 hover:text-white";
                promptSection.classList.remove('hidden');
            } else {
                removeBtn.className = "flex-1 py-3 rounded-xl text-xs font-bold flex items-center justify-center gap-2 transition-all bg-rose-600 text-white shadow-lg";
                addBtn.className = "flex-1 py-3 rounded-xl text-xs font-bold flex items-center justify-center gap-2 transition-all text-slate-400 hover:text-white";
                promptSection.classList.add('hidden');
            }
        }

        function updateBrushSize(val) {
            brushSize = val;
            document.getElementById('brushSizeVal').innerText = val + 'px';
        }

        function handleFileUpload(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                originalImage = new Image();
                originalImage.onload = function() {
                    initCanvas();
                    document.getElementById('placeholder').classList.add('hidden');
                    canvas.classList.remove('hidden');
                    document.getElementById('uploadSection').classList.add('hidden');
                    document.getElementById('editorActions').classList.remove('hidden');
                };
                originalImage.src = event.target.result;
                base64Image = event.target.result.split(',')[1];
            };
            reader.readAsDataURL(file);
        }

        function initCanvas() {
            const container = document.getElementById('canvasBox');
            const maxWidth = container.clientWidth - 40;
            const maxHeight = 550;
            let width = originalImage.width;
            let height = originalImage.height;
            const ratio = Math.min(maxWidth / width, maxHeight / height, 1);
            width *= ratio; height *= ratio;
            canvas.width = width; canvas.height = height;
            ctx.drawImage(originalImage, 0, 0, width, height);
            canvas.onmousedown = startDraw; canvas.onmousemove = drawing; canvas.onmouseup = stopDraw;
            canvas.ontouchstart = (e) => { e.preventDefault(); startDraw(e.touches[0]); };
            canvas.ontouchmove = (e) => { e.preventDefault(); drawing(e.touches[0]); };
            canvas.ontouchend = stopDraw;
        }

        function startDraw(e) { isDrawing = true; drawing(e); }
        function stopDraw() { isDrawing = false; ctx.beginPath(); }
        function drawing(e) {
            if (!isDrawing) return;
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX || e.pageX) - rect.left;
            const y = (e.clientY || e.pageY) - rect.top;
            ctx.lineWidth = brushSize; ctx.lineCap = 'round';
            ctx.strokeStyle = editMode === 'add' ? 'rgba(99, 102, 241, 0.4)' : 'rgba(244, 63, 94, 0.4)';
            ctx.lineTo(x, y); ctx.stroke(); ctx.beginPath(); ctx.moveTo(x, y);
        }

        function resetMask() { ctx.drawImage(originalImage, 0, 0, canvas.width, canvas.height); }

        async function processAI() {
            const finalKey = systemApiKey || manualApiKey;
            if (!finalKey) {
                showStatus("Harap masukkan API Key di pojok kanan atas!", "error");
                return;
            }
            if (editMode === 'add' && !document.getElementById('promptInput').value) {
                showStatus("Silakan masukkan deskripsi objek!", "error");
                return;
            }

            setLoading(true);
            const prompt = document.getElementById('promptInput').value;
            const fullPrompt = editMode === 'add' 
                ? `In the highlighted area, add this object: ${prompt}. Match lighting and style.`
                : `Remove objects in the highlighted area and fill background naturally.`;

            const payload = {
                contents: [{
                    parts: [
                        { text: fullPrompt },
                        { inlineData: { mimeType: "image/png", data: base64Image } }
                    ]
                }],
                generationConfig: { responseModalities: ['TEXT', 'IMAGE'] }
            };

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-image-preview:generateContent?key=${finalKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (!response.ok) throw new Error("Gagal memanggil API. Pastikan Key benar.");
                const data = await response.json();
                const outBase64 = data.candidates?.[0]?.content?.parts?.find(p => p.inlineData)?.inlineData?.data;
                if (outBase64) {
                    document.getElementById('resultImg').src = `data:image/png;base64,${outBase64}`;
                    document.getElementById('resultView').classList.remove('hidden');
                } else {
                    throw new Error("Hasil AI kosong.");
                }
            } catch (err) {
                showStatus(err.message, "error");
            } finally {
                setLoading(false);
            }
        }

        function setLoading(active) {
            document.getElementById('processingOverlay').classList.toggle('hidden', !active);
            document.getElementById('btnText').innerText = active ? "MENGHUBUNGI AI..." : "TERAPKAN SIHIR AI";
            document.getElementById('processBtn').disabled = active;
        }

        function showStatus(msg, type) {
            const el = document.getElementById('statusMsg');
            el.innerText = msg;
            el.className = `p-4 rounded-2xl text-xs font-medium border ${type === 'error' ? 'bg-rose-500/10 border-rose-500/20 text-rose-400' : 'bg-emerald-500/10 border-emerald-500/20 text-emerald-400'}`;
            el.classList.remove('hidden');
            setTimeout(() => el.classList.add('hidden'), 5000);
        }

        function downloadImage() {
            const link = document.createElement('a');
            link.href = document.getElementById('resultImg').src;
            link.download = `magic-edit-${Date.now()}.png`;
            link.click();
        }

        function closeResult() { document.getElementById('resultView').classList.add('hidden'); }
    </script>
</body>
</html>
