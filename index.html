<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>⚡RenodevGambarAi</title>

<style>

body{
background:#0f172a;
font-family:Arial;
color:white;
text-align:center;
padding:30px;
}

h1{
font-size:34px;
margin-bottom:5px;
}

.subtitle{
color:#94a3b8;
margin-bottom:30px;
}

.container{
max-width:600px;
margin:auto;
background:#1e293b;
padding:30px;
border-radius:15px;
box-shadow:0 0 20px rgba(0,0,0,0.5);
}

.upload{
border:2px dashed #475569;
padding:40px;
border-radius:10px;
cursor:pointer;
margin-bottom:20px;
}

.upload:hover{
background:#334155;
}

button{
padding:12px 18px;
border:none;
border-radius:8px;
background:#22c55e;
color:white;
font-weight:bold;
margin:5px;
cursor:pointer;
}

button:hover{
background:#16a34a;
}

input{
padding:10px;
border-radius:8px;
border:none;
margin-top:10px;
width:80%;
}

img{
margin-top:20px;
max-width:100%;
border-radius:10px;
}

.loading{
display:none;
margin-top:15px;
color:#22c55e;
}

.download{
margin-top:15px;
background:#3b82f6;
}

</style>
</head>

<body>

<h1>⚡ Renoodev AI Image Editor</h1>
<div class="subtitle">Remove background • Enhance • Expand • Add Object</div>

<div class="container">

<div class="upload" onclick="fileInput.click()">
Klik atau drag gambar kesini
<br><br>
<input type="file" id="fileInput" hidden>
</div>

<img id="preview">

<div>

<button onclick="removeBG()">Remove Background</button>
<button onclick="enhance()">Enhance</button>
<button onclick="expand()">Expand</button>

</div>

<br>

<input id="prompt" placeholder="Tambahkan objek (contoh: cewek anime, mobil sport)">

<br>

<button onclick="addObject()">Add Object</button>

<div class="loading" id="loading">⏳ AI sedang memproses...</div>

<br>

<button class="download" onclick="downloadImage()">Download</button>

</div>

<script>

const api = "https://renoodev.vercel.app/api/ai"

const fileInput = document.getElementById("fileInput")
const preview = document.getElementById("preview")

fileInput.addEventListener("change", () => {

const file = fileInput.files[0]

const reader = new FileReader()

reader.onload = e=>{
preview.src = e.target.result
}

reader.readAsDataURL(file)

})

function getFile(){

const file = fileInput.files[0]

if(!file){
alert("Upload gambar dulu")
return null
}

return file

}

async function send(type,prompt=""){

const file = getFile()

if(!file) return

document.getElementById("loading").style.display="block"

const formData = new FormData()

formData.append("image",file)
formData.append("type",type)
formData.append("prompt",prompt)

const res = await fetch(api,{
method:"POST",
body:formData
})

const data = await res.json()

document.getElementById("loading").style.display="none"

if(data.image){
preview.src=data.image
}else{
alert("AI gagal memproses")
}

}

function removeBG(){
send("removebg")
}

function enhance(){
send("enhance")
}

function expand(){
send("expand")
}

function addObject(){

const prompt=document.getElementById("prompt").value

if(prompt==""){
alert("Isi objek dulu")
return
}

send("addobject",prompt)

}

function downloadImage(){

const link=document.createElement("a")

link.href=preview.src
link.download="renoodev-ai.png"

link.click()

}

</script>

</body>
</html>
