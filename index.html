<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Enhancer | Renoodev</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #020617; color: white; font-family: sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .loader { border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid #3b82f6; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-4 min-h-screen flex flex-col items-center">

    <div class="w-full max-w-md space-y-6">
        <div class="text-center py-6">
            <h1 class="text-3xl font-black text-blue-500 italic tracking-tighter">AI ENHANCER PRO</h1>
            <p class="text-slate-500 text-[10px] font-bold tracking-widest uppercase mt-1">Optimization Engine v1.5</p>
        </div>

        <!-- Panel Pesan -->
        <div id="msgBox" class="hidden p-4 rounded-2xl text-xs border bg-slate-900/50"></div>

        <!-- Area Drop/Upload -->
        <div id="dropZone" class="glass rounded-[2rem] p-12 text-center border-2 border-dashed border-slate-700 cursor-pointer hover:border-blue-500 transition-all">
            <input type="file" id="fileInput" class="hidden" accept="image/*">
            <div class="space-y-2">
                <p class="font-bold text-blue-400">PILIH FOTO</p>
                <p class="text-slate-500 text-[10px]">Klik di sini untuk mengambil gambar</p>
            </div>
        </div>

        <!-- Preview & Tombol -->
        <div id="workspace" class="hidden space-y-6">
            <div class="flex gap-2">
                <button onclick="location.reload()" class="flex-1 bg-slate-800 py-3 rounded-xl font-bold text-[10px]">GANTI</button>
                <button id="btnRun" class="flex-[3] bg-blue-600 py-3 rounded-xl font-bold text-[10px] flex items-center justify-center gap-3">
                    <span id="btnLabel">TINGKATKATKAN SEKARANG</span>
                    <div id="spinner" class="hidden loader"></div>
                </button>
            </div>

            <div class="grid grid-cols-1 gap-4">
                <div class="glass p-3 rounded-2xl">
                    <p class="text-[9px] font-bold text-slate-500 uppercase mb-2">Original</p>
                    <img id="imgIn" class="w-full rounded-lg" src="">
                </div>
                <div id="resultCard" class="hidden glass p-3 rounded-2xl border-blue-500/40">
                    <div class="flex justify-between items-center mb-2">
                        <p class="text-[9px] font-bold text-blue-400 uppercase">Hasil AI</p>
                        <button id="btnDL" class="bg-blue-600 px-3 py-1 rounded text-[9px] font-bold">UNDUH</button>
                    </div>
                    <img id="imgOut" class="w-full rounded-lg" src="">
                </div>
            </div>
        </div>
    </div>

    <script>
        // Masukkan API Key Anda di sini
        const access_token = "AIzaSyDJ9VC58D9PY-OMb0inAyJXheKOP0iFR_q"; 

        const fileInput = document.getElementById('fileInput');
        const dropZone = document.getElementById('dropZone');
        const workspace = document.getElementById('workspace');
        const imgIn = document.getElementById('imgIn');
        const imgOut = document.getElementById('imgOut');
        const btnRun = document.getElementById('btnRun');
        const msgBox = document.getElementById('msgBox');
        const resultCard = document.getElementById('resultCard');

        let base64Data = "";
        let imageType = "";

        dropZone.onclick = () => fileInput.click();

        fileInput.onchange = e => {
            const file = e.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = ev => {
                imgIn.src = ev.target.result;
                base64Data = ev.target.result.split(',')[1];
                imageType = file.type;
                dropZone.classList.add('hidden');
                workspace.classList.remove('hidden');
            };
            reader.readAsDataURL(file);
        };

        btnRun.onclick = async () => {
            if(!access_token) return alert("API Key belum diisi!");

            btnRun.disabled = true;
            document.getElementById('btnLabel').innerText = "PROSES AI...";
            document.getElementById('spinner').classList.remove('hidden');
            showMsg("Menghubungkan ke Google AI...", "blue");

            try {
                // Menggunakan endpoint v1 yang lebih stabil
                const response = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${access_token}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [
                                { text: "Enhance this image quality, make it sharp, clear and HD. Output only the image data." },
                                { inlineData: { mimeType: imageType, data: base64Data } }
                            ]
                        }],
                        generationConfig: { responseModalities: ["IMAGE"] }
                    })
                });

                const json = await response.json();

                if(json.error) {
                    throw new Error(json.error.message);
                }

                const outputPart = json.candidates?.[0]?.content?.parts?.find(p => p.inlineData);
                
                if(outputPart) {
                    imgOut.src = `data:${outputPart.inlineData.mimeType};base64,${outputPart.inlineData.data}`;
                    resultCard.classList.remove('hidden');
                    showMsg("Sukses! Kualitas foto berhasil ditingkatkan.", "emerald");
                    imgOut.scrollIntoView({ behavior: 'smooth' });
                } else {
                    throw new Error("Gagal menerima data gambar. Coba foto lain.");
                }

            } catch (err) {
                showMsg("Gagal: " + err.message, "red");
            } finally {
                btnRun.disabled = false;
                document.getElementById('btnLabel').innerText = "TINGKATKATKAN SEKARANG";
                document.getElementById('spinner').classList.add('hidden');
            }
        };

        function showMsg(text, color) {
            msgBox.classList.remove('hidden', 'text-blue-400', 'text-red-400', 'text-emerald-400', 'border-blue-500', 'border-red-500', 'border-emerald-500');
            msgBox.innerText = text;
            msgBox.classList.add(`text-${color}-400`, `border-${color}-500`);
        }

        document.getElementById('btnDL').onclick = () => {
            const a = document.createElement('a');
            a.href = imgOut.src;
            a.download = "AI-Enhanced-Renoodev.png";
            a.click();
        };
    </script>
</body>
</html>
